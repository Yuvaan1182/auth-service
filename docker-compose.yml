services:
  postgres:
    image: postgres:16
    container_name: auth_db
    restart: always
    env_file:
      - .auth.env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: auth_cache
    env_file:
      - .auth.env
    command: redis-server --requirepass ${REDIS_PASS}
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data: 